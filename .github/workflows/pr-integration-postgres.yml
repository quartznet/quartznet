name: pr-integration-postgres

on:
  pull_request:
    branches:
      - main
      - '3.x'
    paths:
      - '**/*'
      - '!docs/**/*'
      - '!package.json'
      - '!package-lock.json'
      - '!readme.md'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  ubuntu-latest:
    name: ubuntu-latest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0
      - uses: actions/checkout@v6
      - name: 'Run: Compile, IntegrationTest (postgres)'
        run: ./build.cmd Compile IntegrationTest --database postgres
        env:
          QUARTZ_TEST_DATABASE: postgres
